version: "3.8"

services:
  # ── PostgreSQL ───────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatbot_user
      POSTGRES_PASSWORD: motdepasse
      POSTGRES_DB: banking_chatbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot_user -d banking_chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared

  # ── Application Python (Orchestrateur) ────────────
  conversation-orchestrator:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: conversation-orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://chatbot_user:motdepasse@postgres:5432/banking_chatbot
      INTENT_SERVICE_URL: http://bnm_backend:8021
      RAG_SERVICE_URL: http://bnm_backend:8021
      BACKEND_URL: http://bnm_backend:8021
      PYTHONPATH: /app
  
    ports:
      - "8020:8020"  # exposer l'API
    networks:
      - shared
    
  # ── Adminer ─────────────────────────────────────
  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    networks:
      - shared

# ── Volumes ───────────────────────────────────────
volumes:
  pgdata:

# ── Networks ──────────────────────────────────────
networks:
  shared:
    external: true
    name: shared-network